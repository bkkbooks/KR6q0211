body:
  text: 古杭昭慶萬壽戒壇傳律沙門書玉釋二三十五佛復二初序源大寶積部決定毗尼經云舍利弗白佛言世尊是諸菩薩於貪瞋癡不怖畏耶佛言舍利弗一切菩薩有二犯戒何等為二一者瞋相應犯二者癡相應犯如是二犯名大破戒舍利弗因貪犯者為過微細難可捨離因瞋犯者為過粗重易可捨離因癡犯者為過深重復難捨離所以者何貪結能為諸有種子生死蔓延連持不絶以是義故微細難斷因瞋犯者墮於惡趣可速除斷因癡犯者當墮八種大地獄中難可解脫舍利弗若諸菩薩成就五無間罪及犯餘罪菩薩應當於三十五佛前晝夜獨處殷重懺悔次顯名科分十二初第一佛南無釋迦牟尼佛釋迦牟尼者釋迦此云能仁姓也從慈悲利物以立名牟尼此云寂默字也依智慧冥理而為號能仁故不住於涅槃寂默故不住於生死悲智並運真俗雙融故名釋迦牟尼也此佛從姓字合稱二第二之第六五佛南無金剛不壞佛南無寶光佛南無龍尊王佛南無精進軍佛南無精進喜佛金剛不壞者淨名云如來身者金剛之體物不能壞諸惡已斷衆善普會何疾何惱故名金剛不壞也寶光者楞嚴云從肉髻中涌百寶光光中現佛宣說神咒故名寶光也龍尊王者謂龍中最尊故稱曰王以喻如來法王衆聖中尊故名龍尊王也精進軍者謂世軍勇猛精進能卻怨敵如來為大法將降伏魔軍故名精進軍也精進喜者謂精進乃修道之寶由精進故專心向道得法喜樂佛果圓成故名精進喜也此五如來法喻表顯三第七之第十四佛南無寶火佛南無寶月光佛南無現無愚佛南無寶月佛寶火者顯非世間之火也有四義故一焚燒義以喻燒諸煩惱故二照了義以喻佛光普照故三熏炙義以喻真如內熏故四成熟義以喻成熟善根故具此四義故名寶火也如楞嚴云如來藏中性空真火清淨本然周遍法界隨衆生心應所知量是也此喻如如佛身寶月光者寶體也以表法身月相也以表解脫光用也以表般若體相用顯故名寶月光也此喻如來功德佛身現無愚者謂智光一發癡障全消故名現無愚也如圓覺經云智慧愚癡通為般若此喻如來智慧佛身寶月者寶濟苦義月清涼義謂以清涼寶普濟衆生除熱惱苦故名寶月也此喻如來應化佛身此四如來法喻顯德四第十一之十二二佛南無無垢佛南無離垢佛無垢者謂如來自性清淨本無垢染故名無垢也如法界論云自性清淨無有染著故名如來也離垢者謂如來覺體無量劫來永離煩惱塵垢故名離垢也如法界論云不淨衆生界染中淨菩薩最極清淨者是說為如來前是在纏如來藏本覺性淨故後是出纏如來藏圓覺究淨也此二如來並約法說五第十三之十五三佛南無勇施佛南無清淨佛南無清淨施佛勇施者謂以財法無畏三種等施衆生無有懈退故名勇施也清淨者謂如來自性清淨離諸塵染內外洞徹無幽不燭故名清淨也清淨施者謂以正助道法教化衆生三輪體空能所不著故名清淨施也此三如來悲智雙融事理顯德六第十六之十九四佛南無娑留那佛南無水天佛南無堅德佛南無栴檀功德佛娑留那者此云甘露水謂甘露有起死回生之功佛法具轉凡成聖之德有此功能故名娑留那也水天者謂以性天理水長養心苗修習觀行成正覺果故名水天也堅德者謂以無漏戒法修攝其心如保浮囊堅守不破以德彰名故名堅德也栴檀功德者謂有益於事曰功救度一切曰德謂如來說法不可思議衆生聞之如得栴檀病即除愈具此力用故名栴檀功德也此四如來法喻顯德七第二十之二十二三佛南無無量掬光佛南無光德佛南無無憂德佛無量掬光者掬撮也謂如來妙相撮出光明重重無盡故名無量掬光也光德者謂慈光普照利益有情恩德無盡故名光德也無憂德者謂如來證大涅槃永離諸漏無有憂惱具此功德故名無憂德也此三如來皆以德顯八第二十三之二十六四佛南無那羅延佛南無功德華佛南無蓮華光遊戲神通佛南無財功德佛那羅延者此云堅固謂佛身堅固猶若金剛無能沮壞故名那羅延也功德華者謂如來功成妙智了悟真常萬行因華莊嚴果德故名功德華也蓮華光遊戲神通者華光表佛智也謂光雖遠照而本不移以喻如來遊化諸方不離華光三昧皆以神通變現故名蓮華光遊戲神通也財功德者謂如來以功德法財普濟諸有證大菩提故名財功德也此四如來從喻顯德九第二十七之二十九三佛南無德念佛南無善名稱功德佛南無紅焰帝幢王佛德念者德成佛之本也念利生之心也以德故上弘佛道以念故下化衆生二利同圓故名德念也善名稱功德者善讚美之稱謂如來所修利生功德讚莫能窮見相聞名咸霑利樂故名善名稱功德也紅焰帝幢王者紅焰乃天帝宮中赤珠幢之光也珠光遠射故曰紅焰此幢惟天帝宮中所有故稱為王以喻如來身相紫金光焰大千國土惟佛最尊故名紅焰帝幢王也此三如來法喻表顯十第三十之三十三四佛南無善遊步功德佛南無鬥戰勝佛南無善遊步佛南無周匝莊嚴功德佛善遊步功德者謂如來行步猶若象王不類餘人輕舉妄動凡所施行皆能感發一切衆生發菩提心增長功德故名善遊步功德也又具三種意生身善遊步者種類意身功者三昧意身德者覺法意身也詳如楞伽經說鬥戰勝者謂佛以智箭禪弓光明慧劍與陰魔煩惱魔共鬥諸天魔外戰力不如咸皆受化故名鬥戰勝也善遊步者謂如來以神足力周遍十方自在遊行感化諸有故名善遊步也周匝莊嚴功德者謂十方三際生佛依正悉以功德法行淨妙莊嚴非類世間有為物比故名周匝莊嚴功德也此四如來以法表顯十一第三十四之三十五二佛南無寶華遊步佛南無寶蓮華善住娑羅樹王佛寶華遊步者有二意一謂盛衆妙華供養他方十萬億佛即以食時還到本國飯食經行也二如來足下有千輻輪相凡所遊行寶華乘足故名寶華遊步也寶蓮華善住娑羅樹王者寶蓮清淨無垢之華也善住身心安住故娑羅此云最勝亦云堅固既勝且固故名樹王謂如來於此樹下安住身心起智斷惑心寶如蓮永離諸垢猶如樹王最勝堅固故名寶蓮華善住娑羅樹王也此二如來法喻表顯十二法界身佛南無法界藏身阿彌陀佛法界藏身者有其二意一謂因名法藏比丘果成法界藏身報也二如觀經云諸佛如來是法界身入一切衆生心想中今彌陀亦法界身遍十方虛空法界微塵剎土中也阿彌陀者此翻亦有二意一云無量壽謂彼佛壽命無量無邊阿僧祗劫故二無量光謂彼佛光明照十方國無有障礙故然理實身相功德依正莊嚴皆無有量故稱阿彌陀也此亦單就法說詳如諸淨土經略釋三十六佛名竟寶積經云一切衆生若有五逆十惡萬劫不通懺悔者應須頂禮三十五佛至心懺悔一切罪障即皆除滅也然此三十五佛後加彌陀佛者有四意故一彌陀佛名一稱禮時能滅八十億劫生死重罪五逆三途悉超脫故二彌陀化主雖在西方發願來度娑婆世界衆生接引十念往生九品故三成佛以來於今十劫現在說法普度十方諸衆生故四釋迦如來與十方佛並讚阿彌陀佛故有此四意所以加也問如來德號有無量義今約此一種以釋者豈非缺略耶答有二義故一者諸佛名號無有定故或依姓立如釋迦彌勒或從字稱如無垢離垢或依或正如栴檀窟阿閦毗或喻或法如山海慧金海光因果如彌陀功德如勇施名雖各異義實互通故法苑云如釋迦翻能仁豈有一佛非能仁也阿彌陀云無量壽豈有一佛非長壽也但以逗機設化故隨世建立也二諸佛名號通同一故華嚴云十方諸如來同共一法身一心一智慧力無畏亦然楞伽云一切諸佛四種皆等一字等如佛十號二語等六十四種梵音言語三身等法及色身四法等正助道品準二經義則此八十九佛名德一多遍容彼此交攝舉一佛即通一切佛釋一義即顯無量義有何增減不圓融耶四懺悔分二初長文二重頌長文復二初發露懺悔二陳善回向初中又三初求佛哀祐二詳列罪障三總申懺悔今初如是等一切世界諸佛世尊常住在世是諸世尊當慈念我如是下四句總結諸佛也如是指上八十九佛而言等者該通十方微塵剎土無量佛也向下正顯在無量諸佛前發露之意一切世界諸佛世尊者是橫遍而言常住在世者乃豎窮而說謂佛真法身湛若虛空周遍法界恆常不動故是諸等二句求佛哀祐也謂諸佛大慈當哀念祐助於我令我今日發露懺悔罪障悉除也二詳列罪障分三初業障二惑障三報障初中又二初總陳二別舉今初若我此生若我前生從無始生死已來所作衆罪若自作若教他作見作隨喜若我三句明積生此生現世也前生過去也無始歷劫纍世也謂生死無間往來不斷故所作四句別開衆罪所作罪者謂於三業六根所作一切罪也衆者在家姦盜殺害等出家性遮輕重等自作者親身作也教他者令人作也見作隨喜者謂見聞他人作罪我隨順歡喜勸讚激發方便成就也自作身家罪教他口家罪隨喜意家罪也二別舉分三初盜三寶物二造五逆罪三行十惡法今初若塔若僧若四方僧物若自取若教他取見取隨喜若塔下二句標用物塔者謂佛身像塔院與佛祖舍利塔也僧者三師七證住持剃度依止受業等也四方僧者一指現前四方僧衆二影嚮過未四方僧衆以招提常住極三際故物者謂供養三寶物及施現未四方賢聖僧等物也若自三句出罪障也不與而行偷盜謂之取如強劫竊詐等觀經云偷僧祗物盜現前僧物如此罪人應墮地獄二造五逆罪五無間罪若自作若教他作見作隨喜初句罪相也五無間罪者謂法界有情隨所造作弒父弒母弒阿羅漢出佛身血破和合僧上名五逆弒和尚弒阿闍黎等業名七逆罪受此苦報無有間斷故名無間罪也五者一趣果無間趣即向也謂諸有情不問男子女人老幼貴賤及天龍神鬼罪業所感悉同受之故名趣果無間也二受苦無間謂諸有情於劍樹刀山鑊湯爐炭煬銅鐵汁備受諸苦無有休歇故名受苦無間也三時無間謂諸有情墮此地獄歷劫受罪無時間歇故名時無間也四命無間謂諸有情墮此地獄從初入時至百千萬劫一日一夜萬死萬生受苦無間故名命無間也五形無間謂此地獄縱廣八萬四千由旬一切有情於中受苦一人亦滿多人亦滿故名形無間也若白下三句造作也梵語阿鼻此云無間亦云無遮無救若造七遮五逆罪者當墮無間大阿鼻地獄中問前但盜取三寶中物其罪尚輕云何先懺今則殺害二親僧佛其罪甚重何後懺耶答前盜物罪較弒雖輕易作多作故當先懺此弒逆罪較盜實重難作少作故後懺也又不信三寶然後偷盜隨起邪見撥無因果甚至殺害故為先懺若弒師長僧衆不容及弒父母王法必戮在家出家共怖作者千萬中一難得其事故後懺也三行十惡法十不善道若自作若教他作見作隨喜初句示惡業惡者謂體性是罪故十不善道者謂乖理之行名為不善十者一殺害二偷盜三邪淫四妄言五綺語六惡口七兩舌八貪欲九瞋恚十邪見皆由衆生觸境顛倒縱此惑情於身口意動與理乖成此十不善道亦即十惡法也若自下起造也人天道中十惡並作正法念經說此十不善道是地獄因於十善道應當修學則於惡趣永不墮落也二惑障所作罪障或有覆藏或不覆藏初句總前三種也或有下依業起惑也覆藏者謂覆隱藏匿也隨煩惱攝於自作罪恐失利譽覆藏不露也於他作罪揚其醜惡暗顯己長故不覆藏也此兼自他分攝若單自言大則覆藏小則不覆也又初則覆藏恐人輕毀後必悔惱不覆藏也唯識論云謂覆罪者後必悔惱不安隱故此覆貪癡分攝三報障應墮地獄餓鬼畜生諸餘惡趣邊地下賤及蔑戾車應墮者明前惡業是因此七種報是果理應受斯苦也梵語泥犁耶此云地獄謂獄在大地下故上品逆惡所墮稱為火途從燒熱得名梵語闍黎哆此云餓鬼長受飢虛苦故下品逆惡所墮稱為刀途從驅殺為名梵語底栗車此云畜生為人世畜養故亦云旁生形旁不正故中品逆惡所墮稱為血途從相啖為名惡趣者謂修羅神道等觀經云作不善業五逆十惡應墮惡道受苦無窮邊地者邊海鹵地窮隅困島也下賤者為人奴僕受他遣使也蔑戾車此云惡見即邪見家人資中曰邊邪不正見家人也經云當墮三惡趣中無量千歲受劇苦已來生人間作牛馬駝驢或得為人生居下賤作人奴婢受他驅役等三總申懺悔如是等處所作罪障今皆懺悔如是指上業惑苦三道障處也等者謂攝八難及餘見障也所作罪障者謂於身口意所作三障罪也今皆懺悔者謂包藏瑕疵佛不許可所以念地獄苦發菩提心求哀懺悔願如上等罪悉皆消滅也觀經云為讚阿彌陀佛威德此人聞已除八十億劫生死之罪地獄猛火化清涼風吹諸天華上有化佛迎接此人又云至心十念南無阿彌陀佛稱佛名故於念念中除八十億劫生死之罪見金蓮華住其人前於一念頃生極樂國聞稱一佛功德尚且如是況復稱禮八十九佛名耶則今懺除罪障如風掃地纖毫不餘矣二陳善回向分三初復請證明二別舉善根三總結回向今初今諸佛世尊當證知我當憶念我初句求佛也諸佛者十方一切佛也世尊者三世所尊也總該同前當證等句請證也證知者謂當以天眼他心通鑑我此世善根也憶念者謂當以宿命漏盡明達我前世無始生來善根也二別舉善根我復於諸佛世尊前作如是言若我此生若我餘生曾行布施或守淨戒乃至施與畜生一摶之食或修淨行所有善根成就衆生所有善根修行菩提所有善根及無上智所有善根我復下四句略舉多生也前者謂我身在於諸佛前也如是言者謂指下所陳語言也此生現生也餘生過去生無始生也曾行下詳列衆善也布施者謂施錢財穀帛衣食樂具等種種供養布於三寶門中也淨戒者謂五戒八戒十戒具戒菩薩大戒至心守持如護明珠毫無損失故此舉六度之二也乃至者謂燒香散花燃燈掃地低頭合掌頂禮讚歎誦經持咒等此舉萬行之一也施畜生者如佛下食於狗一摶食者取少分食而分惠之也然施則治前盜取戒則治前逆惡也淨行者謂三十七品助道法八萬四千波羅密行也此治前覆藏不覆藏罪障也成就衆生者謂若財若法及諸無畏隨其所須悉令如願此治前三途苦報也菩提者謂七菩提三菩提此治前四惡趣及邊邦地也無上智者謂一切智一切種智此治前下賤與邪見人也所有善根者謂結如上所修善根故此治前三障道也三總結回向一切合集校計籌量皆悉回向阿耨多羅三藐三菩提如過去未來現在諸佛所作回向我亦如是回向一切下分二一總明初二句施善也開二意一上句集戒施下句量善根二合集約過去校計約現在籌量約未來皆悉等句回向也施善是因菩提是果謂回因向果也亦可舉一攝三謂施三寶菩提上智是回因向果義施畜成就是回自向他義守戒修行是回事向理義當如法思之如過等四句乃例顯引今普願回向是例同三世諸佛也二重頌衆罪皆懺悔諸福盡隨喜及請佛功德願成無上智去來現在佛於衆生最勝無量功德海我今皈命禮衆罪下二先別舉前功懺悔句頌前六懺隨喜句頌前七善此二回事向理也請佛頌前二證成智頌前菩提上智此二回因向果也衆生十界通稱最勝者佛稱無上衆生故此二句頌前成就施畜普願九界衆生同於三世諸佛共成正覺是為回自向他也此即普賢十願及彌勒五悔之義無量下二句總讚回向也如上五願三向功德深廣如海如牟尼珠利樂無盡此唯諸佛能知故我一心皈命禮也前一頌五悔通收後一頌具結前起後之意五發願分二初正發行願次結願無盡初中分八初禮敬諸佛二稱讚如來三廣修供養四懺悔業障五隨喜功德六請轉法輪七請佛住世八普皆回向今初所有十方世界中三世一切人師子我以清淨身語意一切遍禮盡無餘普賢行願威神力普現一切如來前一身復現剎塵身一一遍禮剎塵佛此中所引華嚴行願品後重頌十大願偈者謂欲令諸聞者依之發廣大行願直入一乘圓頓妙覺果海故也然願願之中皆具六相十玄之義如願思之其理自顯茲不繁贅所有十方世界等者謂東西南北四維上下曰十方過現未來曰三世一切者該通十方三世諸佛也人師子者以喻佛也佛本於人中得道故亦稱人說法無畏故喻師子涅槃師子吼品云如獅出窟四足踞地振尾發聲水性之屬潛沒深淵陸行之類藏伏窟穴飛者墮落諸大香象怖走失糞喻佛出世圓音說法如大雷震降伏天魔制諸外道故云人師子也永嘉云師子吼無畏說百獸聞之皆腦裂香象奔波失卻威天龍寂聽生歡悅此初二句舉所禮之境也我以清淨身語意者謂以戒攝心身不妄動口不妄言意不妄想如是三業虔誠一心觀佛正念翹勤五體投地也一切遍禮盡無餘者謂十方三世一切佛剎極微塵數諸佛世尊我皆遍禮而無空過故云我以清淨身語意一切遍禮盡無餘也此三四句舉能禮之業也能所皆空自然如願經云我以普賢行願威德神通力故深心信解如對目前故云普賢行願威神力普現一切如來前也又云一一佛所皆現不可說不可說佛剎極微塵數身一一身皆悉遍禮不可說不可說佛剎極微塵數佛故云一身復現剎塵身一一遍禮剎塵佛也後四句明現身禮佛成廣大願也總上二頌乃是一者禮敬諸佛懺悔多生以來我慢障業得尊貴身二稱讚如來於一塵中塵數佛各處菩薩衆會中無盡法界塵亦然深信諸佛皆充滿各以一切音聲海普出無盡妙言辭盡於未來一切劫讚佛甚深功德海於一下先舉所讚經云所有盡法界虛空界十方三世一切剎土所有極微一一塵中皆有一切世間極微塵數佛故云於一塵中塵數佛也又云一一佛所皆有菩薩海會圍繞故云各處菩薩衆會中也此初二句明一塵也謂於一微塵中所有微塵數佛並各處在菩薩衆會中也無盡法界塵亦然者此例多塵也謂無盡法界空中所有多塵一一塵中所有塵數諸佛亦各處在菩薩衆會中也蓋有主必有伴今主處伴中正是主伴和融因果交徹如一室千燈燈燈相涉無壞無雜不相障礙也深信者謂深心信解也由深心信解諸佛故得充滿也各以下次明能稱讚初句音聲次句言辭三句劫際四句讚德經云我當悉以甚深勝解現前知見各以出過辨才天女微妙舌根一一舌根出無盡音聲海一一音聲出一切言辭海故云各以一切音聲海普出無盡妙言辭也又云稱揚讚歎一切如來諸功德海窮未來際相續不斷故云盡於未來一切劫讚佛甚深功德海也以上八句乃二者稱讚如來懺悔無量劫來惡口障業得無礙辨才三廣修供養以諸最勝妙華鬘妓樂塗香及傘蓋如是最勝莊嚴具我以供養諸如來最勝衣服最勝香末香燒香與燈燭一一皆如妙高聚我悉供養諸如來我以廣大勝解心深信一切三世佛悉以普賢行願力普遍供養諸如來以諸等八句五塵供也最勝者勝有三義一最上二最妙三最多華鬘傘蓋燈燭色塵供妓樂聲塵供塗末燒香塵供衣服觸塵供缺一飲食味塵攝在供養事中也梵語須彌盧此云妙高山縱廣八萬四千由旬聚堆積也謂堆積此五塵妙供一一皆如須彌山之高廣而為供養諸佛故云一一皆如妙高聚我悉供養諸如來也經云華雲鬘雲天音樂雲天傘蓋雲天衣服雲天種種香塗香燒香末香一一量如須彌山王燃種種燈蘇燈油燈一一燈炷如須彌山一一燈油如大海水以如是等種種供具常為供養者是也我以下四句法供養也大而無外曰廣勝解心者唯識論中五別境之一心所也深信者亦善十一內之一心所也行願力者普賢王之大願心也經云諸供養中法供養最所謂如說修行供養利益衆生供養攝受衆生供養代衆生苦供養勤修善根供養不捨菩薩業供養不離菩提心供養謂如上等法我以勝解心深信供養諸佛皆仗普賢願力方得成就故云悉以普賢行願力普遍供養諸如來也當知前五塵供無量功德比法供養一念功德百分不及一千分不及一百千萬億分亦不及一何以故以諸如來尊重法故以如說行出生諸佛故若諸菩薩行法供養則得成就供養如來如是修行是真供養也總上三頌是三者廣修供養懺悔多生多劫慳貪障業得大財富四懺悔業障我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔諸惡業者十惡業也謂此十惡業障之根皆由無始以來貪瞋癡三毒所造也貪者引取之心也瞋者忿怒之心也癡者迷惑之心也毒者害也謂此三種皆能破壞出世善心故名為毒如意地一念貪愛身則廣行淫欲口則妄言綺語意地一念瞋恚身則廣行殺害口則惡罵意地一念愚癡身則廣行盜竊口則兩舌既諸不善從一念而結業今當還依一念而解釋也如人地倒還從地起故我一念翹勤五體投地披陳發露求哀懺悔若根若枝如湯潑雪盡淨無餘也此四句即四者懺悔業障正懺無始以來所有諸惡業障得依正具足五隨喜功德十方一切諸衆生二乘有學及無學一切如來與菩薩所有功德皆隨喜諸衆生者指人天等諸有情也二乘即聲聞緣覺各有二類曰有學者研真斷惑也曰無學者真窮惑盡也如來果人菩薩因人經云諸佛如來從初發心為一切智勤修福聚不惜身命經不可說不可說佛剎極微塵數劫一一劫中捨不可說不可說佛剎極微塵數頭目手足如是一切難行苦行乃至成就無上菩提及般涅槃分布舍利所有功德我皆隨喜一切菩薩聲聞緣覺志求菩提所修功德我皆隨喜豈但賢聖及彼十方一切世界六趣四生一切種類所有功德乃至一毫之善我皆隨喜故云所有功德皆隨喜也此一頌即五者隨喜功德懺悔多生以來嫉妒障業得大眷屬六請轉法輪十方所有世間燈最初成就菩提者我今一切皆勸請轉於無上妙法輪世間燈者以喻十方一切佛也古云如來不出世萬古如長夜今十方三世一切佛剎極微塵數諸佛如來各以智照之明破滅癡暗故云世間燈也初二句舉佛初成正覺次二句請轉法輪也所言輪者有摧碾之義謂如來說法摧碾一切衆生之惑業也經云我當悉以身口意業種種方便殷勤勸請轉妙法輪故云我今一切皆勸請轉於無上妙法輪也此四句乃六者請轉法輪正懺悔無始以來所有乘緩不求佛法障得慈善根七請佛住世諸佛若欲示涅槃我悉至誠而勸請惟願久住剎塵劫利樂一切諸衆生十方三世曰諸三覺具圓曰佛梵語涅槃此云大滅度大即法身滅即解脫度即般若奘三藏翻為圓寂賢首云德無不備稱圓障無不盡稱寂大經云涅言不生槃言不滅不生不滅名大涅槃至誠者專意也經云所有盡法界虛空界十方三世一切佛剎極微塵數諸佛如來將欲示現般涅槃時金身掩耀玉毫收彩我以普賢行願力故至誠勸請莫入涅槃故云諸佛若欲示涅槃我悉至誠而勸請也又云惟願久住在世經於一切佛剎極微塵數劫說微妙法教化衆生皆種善根熏習成熟開智慧花結菩提果展轉利樂一切有情同圓種智故云惟願久住剎塵劫利樂一切諸衆生也不但如來涅槃及諸菩薩聲聞緣覺有學無學乃至一切諸善知識欲入涅槃我悉勸請也此一頌是七者請佛住世正懺曠劫以來輕慢佛障得智慧多聞八普皆回向分二先總次別今初所有禮讚供養福請佛住世轉法輪隨喜懺悔諸善根回向衆生及佛道前三句是回前七願後一句乃向歸二處也禮即禮敬諸佛讚即稱讚如來供即廣修供養請即請佛住世轉即請轉法輪隨即隨喜功德懺即懺悔業障回向即普皆回向衆生即恆順衆生佛道即常隨佛學今第八願即言回向者謂欲回前七善向歸衆生佛道故言諸善根者根有能生之義謂能生長一切善法利濟衆生圓滿普賢十大願故經云從初禮拜乃至隨順所有功德皆悉回向一切衆生願令衆生常得安樂無諸病苦欲行惡法皆悉不成所修善業皆速成就關閉一切諸惡趣門開示人天涅槃正路乃至成就無上菩提故云回向衆生及佛道也此即回因向果亦乃回事向理也此一頌乃是十者普皆回向總懺多生以來狹劣障得廣大善也以上所引十二偈頌是為普賢十種大願若能於此隨順趣入則能生長一切功德則能成熟一切衆生則能隨順諸佛菩提則能成滿普賢願海也次別分三初回事向理願將以此勝功德回向無上真法界上句勝功德指前十願事也下句真法界是實際地理也志求滿足曰願如阿難云如一衆生未成佛終不於此取泥洹是也回向者謂回事向理也無上者謂無過於上也真法界者謂不妄曰真交徹融攝故曰法界即是諸佛平等法身從本以來不生不滅非空非有離名離相無內無外惟一真實不可思議無障礙性故云真法界也二回因向果性相佛法及僧伽二諦融通三昧印如是無量功德海我今皆悉盡回向初二句舉所向性者自性三寶也謂自一心性上照窮法界即名佛寶自性湛寂不遷即名法寶自心性中寂照不二即名僧寶相者別相三寶也法報應化即名佛寶教理智斷即名法寶三乘階次即名僧寶上之三寶佛即是法法即是僧全依自己一性而顯理也此之三寶佛不是法法不是僧各各別有義相以明事也理性三寶則絶朕纖毫不立真諦也事相三寶則森然萬法齊彰俗諦也俗是即真之俗真是即俗之真真俗融通圓成中道諦也入此諦觀名為海印三昧梵語三昧此云正定離偏邪曰正絶昏散曰定又云正受不受諸受故名正受又約真如自性法界心地言之此一心性從來不與染法相應佛寶真諦也本來具足恆沙德相法寶俗諦也自來圓融和通無礙僧寶中諦也本無委曲本無散亂是真三諦三寶三昧印也又復此一心性以不變義即名理性三諦三寶以隨緣義即名事相三諦三寶統總言之若性若相若理若事皆不離此一心性中海印三昧定也賢首品云或現聲聞獨覺道或現成佛普莊嚴如是開闡三乘教廣度衆生無量劫隨其所樂悉令現海印三昧威神力第三句明能回如是者指上十願諸善法也出生功德如海深廣故云無量第四句正回向也我者指行人自己也回者指上能回因也向者指上所向果也謂我今以如是十大願王無量功德海因皆悉回向自性三寶一心三諦海印三昧果海之中故云如是無量功德海我今皆悉盡回向也三回自向他所有衆生身口意見惑彈謗我法等如是一切諸業障悉皆消滅盡無餘念念智周於法界廣度衆生皆不退所有下分二先回懺滅障無餘初句能造三業具二句所作惑業法也見惑者謂身見邪見邊見等惑也彈者貶斥也謗者誹毀也我法等含二意一謂我佛所說法也二謂我指身即身見也法指佛法謗無佛法撥無因果即邪見也等指斷常二邊見說業障者業單彈謗我法等業也障兼見惑煩惱障也皆消滅者謂悉皆仗回自向他之力消諸業障盡淨無餘也問彼人造業應須彼人自懺如何我之回懺能消彼之業障耶答以天性相關故華嚴云心佛及衆生是三無差別則彼之業障即我之業障也我之回懺即彼之回懺也消滅何為不可乎念念下次向度生皆不退心運實智證諸佛法界理心運權智度法界諸衆生三法既然同一性天智月故我回自向他之力能令念念智周一大法界廣度衆生皆到諸佛不退之地故云念念智周於法界廣度衆生皆不退也後結願無盡乃至虛空世界盡衆生及業煩惱盡如是四法廣無邊願今回向亦如是此偈總結普賢十大行願無盡際也前二句明四法若盡則回向亦盡後二句例四法無邊則回向願亦無邊也四法者一虛空界二衆生三業四煩惱也經云虛空界盡我願乃盡以虛空界不可盡故我此十願無有窮盡如是乃至衆生界盡衆生業盡衆生煩惱盡我願乃盡而衆生界乃至煩惱無有盡故我此十願亦無有盡念念相續無有間斷身語意業無有疲厭故總結云願今回向亦如是也南無大行普賢菩薩三稱大行普賢菩薩者謂供養一切心無厭足故稱為大難行能行難作能作故稱為行行彌法界故名曰普位鄰極聖故名曰賢萬行莊嚴諸佛法藏所以稱為大行普賢菩薩也然無邊勝福莫過行門諸佛菩薩從行門出故華嚴會上推普賢菩薩為長子以其先入如來藏身三昧後說行願復稱願王示其願行當依此修證不唯滅罪生福實能見性成佛也大行是法普賢同佛菩薩屬僧如是三稱則三寶全具首尾照應事理無礙也跋經云造罪滿大地積惡如恆沙惟有懺悔力乃能得除滅應知此法不可思議也蓋由凡夫不了顛倒是非但知求福而不求悔殊不知罪滅即福生未有罪不滅而福生者也故不空不動二尊者體佛弘慈出此懺文普勸人人精修勤學一念感通諸佛自然垢淨光生又何愁不是千佛一數其懺悔之功豈小補哉時康熙己丑冬分第三白半月長淨書玉閣筆識
