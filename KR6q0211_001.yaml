body:
  text: 古杭昭慶萬壽戒壇傳律沙門書玉釋解此懺悔大分開三初題目二集人三入文今初大懺悔文大者大乘之法也謂揀去權小特發大心故懺悔者乃萬行之初機解脫之根本入道之要門利生之方法也解黏去縛莫過於此依之而修則無罪不滅無福不生其福之生也如春回大地罪之滅也如雪點紅爐故經云懺悔則安樂不懺悔則罪益深由是觀之蓋吾人不可不為當務之急而勤行懺悔之法也梵語懺摩華言悔過今言懺悔者華梵兼舉也光明文句云懺者首也悔者伏也順從為首不逆為伏謂行人順從三寶足下依教修行不敢違逆故所以作法之時先敬三寶次伸懺悔也又懺名白法悔名黑法白法須尚而行之黑法須棄而捨之取捨合論故言懺悔亦即改往修來之意謂修將來之善果改已往之惡因也又懺名披陳衆失發露過咎不敢隱諱悔名斷相續心厭悔捨離能作所作合棄故言懺悔如後說罪之法是也又懺者名慚悔者名愧慚則慚天愧則愧人人見其顯天見其冥冥細顯粗粗細皆惡故言懺悔總而言之已作之罪悉願消滅未作之罪不敢更作也然懺法有事理之不同事懺者謂晝夜六時三業清淨對於尊像披陳過罪無始至今凡所造作五逆十惡及餘一切隨意發露更不覆藏畢故不造新者是也理懺者謂斂攝身心深念實相觀此罪性不在內外亦非中間更推能作之心亦不在內外中間三處能造之心既爾而所作之罪亦然心既當體即空罪性了不可得者是也故普賢觀經云若欲懺悔者端坐念實相衆罪如霜露慧日能消除其事懺懺苦道業道理懺懺煩惱道又理事懺法不出三種理謂無生妙懺事謂取相作法也無生懺者謂了我心自空罪福無主觀業實相見罪本源法界圓融真如清淨故取相懺者謂定心運想相起為期故作法懺者謂身口所作一依法度故然法雖三種要須行在一心當知三種懺法無生是正二為助緣如灰汁皂角助於清水正助合行如膏益明證理彌速也又此三種懺法後一雖可獨修不進須假前二而前二不可暫離無生得此意已方可說行三種懺法也若論其功能作法滅違無作罪及違戒上罪三惡報障業障怖畏憂愁煩惱取相滅性罪及犯定上罪人道報障業障四住煩惱無生滅無明及犯慧上罪三界有漏報障業障無明煩惱作法屬身口二業取相屬意之事一心上二皆事也無生屬意之理一心此一唯理也窮理在事了事即理理事融通是名懺悔如別時而修則作法喻服薑桂差病而已不能肥身若取相喻服五石病差身充不能得道修無生喻服五芝病除身飛升仙得道故知懺悔不出此三法也文者能詮文字也若論至道之法本來離言說相離文字相古云大道元來不屬言擬談玄妙隔天淵豈可以文言而能詮者哉然道雖無言要因言以顯道故清涼疏云雖空空絶跡而義天之星象燦然湛湛忘言教海之波瀾浩瀚則無文字中不妨有此懺悔文也二集人宋西夏護國仁王寺金剛法師不動集宋朝代也西夏國名也謂地在寧夏西邊故宋真宗封趙德明為夏王仁宗又封其子趙元昊為夏國王法師西來先至彼處弘法利生也護國等五字寺名也謂師以護國仁王般若經普令緇素誦持祝國祐民故金剛等六字人號也上四字通稱下二字別名法師者謂通顯密三藏法中最上之稱也金剛者謂瑜伽有五部曰佛曰金剛曰寶生曰蓮華曰羯磨也師現傳金剛一部故名金剛法師此乃灌頂時所授稱也梵語阿閦撇此云不動謂師最初依阿閦部法而行持故集者顯德也謂師欲令道俗修證故以唐三藏不空法師所譯三十五佛名經禮懺文前增五十三佛德號後綴普賢十大願偈前後共成一百八禮期斷百八煩惱故後遷四川蒙山又集施食儀文為出生軌範因以甘露度孤復稱甘露法師今時諸方叢林靜室目為課誦以山彰名所謂蒙山施食也此實法中二利行用之要大有功於佛門者也餘諸神應備載別記百八禮者謂初偈一禮上師一禮佛法僧一禮發心一禮三皈三禮十號一禮八十九佛名八十九禮懺悔一禮回向一禮前八別願八禮後一總向一禮初後各三禮不在此數內自修行本斯為第一非如今時跪𮘗而已也恐後遺失故贅於此三入文科分為五初讚禮二發心三皈依四懺悔五發願今初大慈大悲愍衆生大喜大捨濟含識相好光明以自嚴衆等至心皈命禮初二句讚佛心三句讚佛身四句皈命也慈者與其樂悲者拔其苦喜者慶其善捨者去其惡大者以此四種名為無量心故不同世人愛染慈悲情見喜捨乃無緣大慈同體大悲故曰大慈大悲喜無所喜捨無所捨故曰大喜大捨愍者憐愍濟者濟度衆生者衆法相生也此指六道而言含識者含靈抱識也此指四生而言實則衆生即含識易名不易體也相好光明者謂如來身有八萬四千相一一相中有八萬四千隨形好一一好中有八萬四千光明以此相好光明而為莊嚴自佛之身故云以自嚴也至心者一心也一心作法理事皆周內心既虔外儀必敬也命者命根以壽暖識三一期連持不斷稱之為命即八識自體也經云元依一精明分成六和合則命為六根之總六根乃命之別今攝別歸總故曰命耳而云皈者有事有理理則以六和合還歸一精明體事則世人最重惟命與財若捨財猶有命在今捨性命皈投於佛一捨而無所不捨以表誠敬之至故曰皈命禮也二發心分二先皈依性相勝境次正發菩提大心初中復二初同體三寶二別相三寶今初南無皈依金剛上師金剛上師者毗盧教主也以毗盧如來是金剛瑜伽大祕密主而為無盡三寶父母師長故又四方四佛及一切賢聖皆從毗盧金剛心中之所流出故先皈依自性三寶次皈依別相三寶然自性即同體也南無梵語皈依華言今雙標者二音兼舉也又灌頂疏南無翻為度我謂能救度我等衆生是故先須皈依毗盧遮那最上師也餘皆倣此二別相三寶皈依佛皈依法皈依僧佛者娑婆華藏剎海佛也法者顯密教部無上法也僧者大小乘中凡聖僧也皈依者佛為兩足尊皈則不墮地獄故法為離欲尊皈則不墮餓鬼故僧為衆中尊皈則不墮旁生故又復皈依三寶者豈唯離三途之苦而已實欲得三菩提之樂也次正發菩提大心分二初揀去權小我今發心不為自求人天福報聲聞緣覺乃至權乘諸位菩薩我者指行人自己而言發心者謂發菩提大道心也不為自求者正揀權小之境謂不為自己以求人天福報及權乘小果也若為自求即落五乘非真發大心也人中福者貴為天子富有四海是也百官四民福報劣矣洪範明五福謂福壽富貴康寧好德考終也雖則一期快樂難免生死輪回故不求也天上福者六欲天中光明殊勝眷屬相隨華冠鮮麗衣食豐盈等色界諸天有四禪福報乃至無色界天亦有四空定報經云六天雖貴福盡還作牛領中蟲非想雖高壽盡還墮飛狸等類故不求也聲聞者謂聞四諦法而得其名即小乘果斷見思惑證真諦理者雖云逮德己利盡諸有結高超三界迥脫四生奈如獐獨跳不顧後群唯求自度不能度人喻如羊車不堪載物故不求也緣覺者梵語辟支此有二種一云緣覺佛在世時聞十二因緣悟道者二云獨覺佛滅度後獨宿孤峰觀緣悟道者即中乘果更侵習氣者也今單列緣覺者舉緣攝獨耳謂雖有度生之念其心不大喻如鹿車雖可載物不堪重運故不求也權乘者大乘權教也諸位菩薩者藏通二教及別教地前之菩薩也以藏教菩薩三祗修六度百劫種相好帶惑行因故通教菩薩道觀雙流真俗並現所侵習氣猶餘少灰故別教三賢雖各斷惑行事六度著相修持未斷無明未證實理故名權乘謂雖發大心廣度衆生以其才行四百由旬未能超過直至寶所喻如牛車雖可重載不能致遠故不求也法華云但以假名字引導于衆生則知三乘皆權非實不言別之登地者以斷惑見理同圓故然自他既不願求云何為彼發其心耶經云十方佛土中惟有一乘法無二亦無三一乘者最上乘也次顯發大心唯依最上乘發菩提心願與法界衆生一時同得阿耨多羅三藐三菩提文分兩節一生起二開顯初句出所依之乘言最上乘者圓教一佛乘也謂圓悟妙理不與餘乘共故般若云此經為發大乘者說為發最上乘者說法華云無有餘乘唯一佛乘以一乘圓頓教人一斷一切斷一證一切證終日成佛無成佛相終日度生無度生相喻如大白牛車實行五百由旬不滯化城直登寶所遊於四方嬉戲快樂是故不依餘乘而依最上乘也次句明能發之心菩提者成正覺之心體也謂能破無明煩惱惡業不被染壞故當發也二開顯願與等四句示心相也言願與法界衆生者正顯不為自己一人而求也一時同得者揀異權乘漸教三大阿僧祗劫而後得也阿耨菩提者諸佛無上正覺之果也阿者言無耨多羅言上三藐言正等三菩提言正覺覺異三途之不覺正異人天之邪覺等異二乘之偏覺上異權乘之未上無異因地之有上則此無上正等正覺乃是圓教一佛乘果也總而言之謂我今時唯依最上佛乘圓頓教中發大菩提道心為因願與法界一切衆生不前不後一剎那間同在現前證得諸佛無上菩提圓妙覺果此心此願方稱究竟也若不如斯因果寧能該徹乎三皈依分二初無盡三寶南無皈依十方盡虛空界一切諸佛南無皈依十方盡虛空界一切尊法南無皈依十方盡虛空界一切賢聖僧十方等舉所依之境也皈依顯能依之人也十方者橫遍也空界者豎窮也皈須塵方剎土盡空法界者以顯行人皈敬之心極廣大也一切者普攝之辭若局一處心則不廣願則不周安能與法界衆生一時同得阿耨菩提耶必須仗承三寶神力加被運心周廣立願弘深方可與法界衆生同得也一切佛法賢聖僧者謂三寶有小乘大乘住持同體別相之不同也小乘以丈六金身為佛四諦因緣為法四果四向為僧大乘以三身十身為佛二空三空理等為法三賢十聖為僧也別相三寶者謂佛在世時如來雪山夜半睹明星而悟道菩提樹下成等正覺即佛寶也寂場鹿苑初轉法輪即法寶也度諸菩薩五比丘等即僧寶也住持者謂刻像圖形即佛寶黃卷赤牘即法寶圓頂方袍即僧寶此之三者不為世法之所侵凌不為煩惱之所染污世出世間皆可尊重故稱為寶住於世間持乎正法能令慧命不斷故名住持三寶也同體三寶者謂名雖三種同以真如理性為體故真如性上有覺照義即名佛寶性有軌持義即名法寶性有和合義即名僧寶須知捨住持三寶別無同體三寶離同體三寶更無住持三寶住持是相相即性中之相同體是性性即相中之性性相一如二而不二迷之者流轉生死悟之者成等正覺也涅槃經云若能觀三寶常住同真際淨名云佛即是法法即是衆如是三寶皆無為相同體屬理性住持屬事相大小乘事理雙通詳如賢首三寶章明今所皈者盡我人之心盡法界之量盡三寶之際塵塵剎剎無不皈命故曰無盡三寶也次通別二號分二初通號南無如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如來者十號經云如過去諸佛行六波羅密得諸法如相來至佛道今佛亦如是道而來故號如來也又具三義謂法報應也般若經云無所從來亦無所去故名如來此以法身釋轉法輪論云本覺名如始覺名來始本不二故名如來此以報身釋成實論云乘如實道來成正覺此約應身釋三身圓顯故名如來應供者謂萬行圓成福慧具足應受天上人間供養饒益有情故號應供也然人天賢聖無明住地全缺應供二乘但盡見思未斷塵沙無明受人天供名半應供如來五住究盡二死永亡非惟受人天供亦受九法界供養是名全應供也又證涅槃時斷盡一切煩惱令身口意清淨無染無著復名無所著也正遍知者謂具一切智於一切法無不了知故號正遍知也什師云正遍覺謂言法無差故言正智無不周故言遍出生死夢故言覺也又以一切法平等開覺一切衆生成無上覺復號等正覺也妙宗鈔云此之三號即名三德今就所觀義當三諦正遍知即般若德真諦也應供即解脫德俗諦也如來即法身德中諦也若廣說此三句義者億劫不能盡也明行足者明即三明謂天眼宿命漏盡明也行即六度萬行足者謂三乘雖得三明明不滿足唯佛無缺萬行圓修故號明行足也善逝者善妙也逝往也謂如來正智能斷諸惑妙出世間能往佛果故又地持經云第一上升永不復還故號善逝也亦云好去大論云於種種諸深三摩提無量智慧中去也世間解無上士者謂世出世間因果諸法正覺正知無不解了故云世間解三界人天若凡若聖乃至一切有情之中惟佛第一最上無有與等故號為無上士也調御丈夫者謂佛具大丈夫力以第一義涅槃之法顯示調伏六道狂象御駕一乘寶車直至涅槃彼岸故號調御丈夫也天人師者謂如來示道一切衆生是應作是不應作是善是不善非獨為四衆之眼目在於天上人間邪魔外道無不依教秉命於佛故號天人師也又云度餘道衆生者少度天人衆生者多佛者覺也覺具三義一自覺謂悟性真常了惑虛妄二覺他謂運無緣慈度有情界三覺滿謂窮源極底行滿果圓三覺圓明智慧具足故號佛也華嚴云一切諸法性無生亦無滅奇哉大導師自覺能覺他世尊者謂具上九號為物欽重故曰世尊又云以無量智慧等法破無邊惑業惡法滅生死苦得無上覺天人凡聖世出世間皆悉尊重故號世尊也一是倣同先跡號二是堪為福田號三是遍知法界號四是果顯因德號五是妙往菩提號六是達僞通真號七是攝化從道號八是應機授法號九是覺悟歸真號十是三界獨尊號此十號義若總略釋無虛妄名如來良福田名應供知法界名正遍知具三明名明行足不還來名善逝知衆生國土名世間解無與等名無上士調他心名調御丈夫為衆生眼名天人師知三聚謂正定聚邪定聚不定聚名佛具茲十德名世間尊前十是別後一是總法數云祖師所述經教皆依此義而釋然阿含及成論合無上士與調御丈夫為一號故至世尊十數方滿涅槃及大論開無上士與調御丈夫為兩號今此經中將世間解與無上士以為一號雖開合不同其義則一故皆存之問剎塵心念可數知無能盡說佛功德德既無盡號亦無盡何惟舉此十耶答此舉大數而言如華嚴說十表無盡故一者數之始十者數之終故舉此十號即攝諸佛無盡德也又此十種通號佛佛皆具故於三皈依後諸佛名前特加稱讚也次別號分二初五十三佛二三十五佛初中復二初序源次顯名今初觀藥王藥上二菩薩經云爾時藥上菩薩為行者稱說過去五十三佛名告言法子過去有佛名曰普光次名普明次名普淨乃至次名一切法常滿王佛爾時藥上菩薩說是過去五十三佛名已默然而住爾時行者即於定中得見過去七佛世尊第一毗婆尸佛而讚歎言善哉善哉善男子汝所宣說五十三佛乃是過去久遠舊住娑婆世界成熟衆生而般涅槃者若有善男子善女人及餘一切衆生得聞是五十三佛名者是人於百千萬億阿僧祗劫不墮惡道若復有人能稱是五十三佛名者生生之處常得值遇十方諸佛若復有人能至心敬禮五十三佛者除滅四重五逆及謗方等皆悉清淨以是諸佛本誓願故於念念中即得除滅如上諸罪次尸棄如來毗舍浮如來拘留孫如來拘那含牟尼如來迦葉如來亦如是讚五十三佛名已亦復讚歎言善男子善女人能聞是五十三佛名者能稱名者能敬禮者除滅罪障如上所說爾時釋迦牟尼佛告大衆言我曾往昔無數劫時於妙光佛末法之中出家學道聞是五十三佛名聞已合掌心生歡喜復教他人令得聞持他人聞已展轉相教乃至三千人此三千人異口同音稱諸佛名一心敬禮如是敬禮諸佛因緣功德力故即得超越無數億劫生死之罪初千人者華光佛為首下至毗舍佛於莊嚴劫得成為佛過去千佛是也次中千人者拘留孫佛為首下至樓至如來於賢劫中次第成佛後千人者日光如來為首下至須彌相於星宿劫中當得成佛佛告寶積十方現在諸佛善德如來等亦曾得聞是五十三佛名故於十方面各皆成佛所謂寧受一切苦得聞諸佛名不受無量樂而不聞佛名也若有衆生欲得除滅四重禁罪欲得懺悔五逆十惡欲得除滅無根謗法極重之罪當敬禮七佛復當敬禮五十三佛然後遍禮十方無量一切諸佛晝夜六時心想明利猶如流水行懺悔法機感道交自然除滅然諸佛各具萬德但於中隨義釋之應當如法理會毋得依文局執也次顯名科分十八初普光之普淨三佛南無普光佛南無普明佛南無普淨佛南無者皈命稱禮也佛者十號中之一也普光等是佛別名各有稱故後皆准此言普光者謂化身百億光照大千故普明者謂報身相好放無邊光明如杲日故普淨者謂一真法身猶若虛空本來清淨故此三如來約三身釋二第四之五二佛南無多摩羅跋栴檀香佛南無栴檀光佛多摩羅跋此云離垢牛頭山名也栴檀此云與藥香也能除風熱等病以喻如來衆德妙香普薰一切衆生聞者離垢清淨故名多摩羅跋栴檀香也栴檀光者楞嚴云自得心開如染香人身有香氣今本佛香光莊嚴明淨滿足衆生見者心眼開明故名栴檀光也此二如來以德表顯三第六之七二佛南無摩尼幢佛南無歡喜藏摩尼寶積佛摩尼幢者幢功德高顯之貌謂如來利生處處建大法幢如摩尼珠隨方現色摧伏魔軍破諸黑暗凡有見者無不皈敬故名摩尼幢也歡喜藏摩尼寶積者如來無盡法喜名之為藏衆生聞者離苦得樂故云歡喜猶若如意寶珠利益無盡故名歡喜藏摩尼寶積也此二如來以喻表顯四第八一佛南無一切世間樂見上大精進佛一切世間乃普及之辭樂見是喜好之意上大精進揀非權小之行也謂此如來因中發最上心修廣大行精進無移故於果上感得一切衆生所愛樂身能令見者聞者皆發菩提故上句名覺他功也下句顯自覺德也功成德滿故名一切世間樂見上大精進也此約因果同圓顯德為號五第九之十二佛南無摩尼幢燈光佛南無慧炬照佛摩尼幢燈光者謂以實智證理喻如摩尼珠幢權智鑒機喻如燈光遍照權實雙彰故名摩尼幢燈光也慧炬照者謂以聞思修三慧火炬照破見思塵沙無明三惑故如燈明暗盡慧起惑除故名慧炬照也此二如來法喻表顯六第十一之十二二佛南無海德光明佛南無金剛牢強普散金光佛海德光明者光明表智德謂如來智德無盡以喻如海故云海德光明也金剛牢強普散金光者金剛性最堅利不為物壞而能壞一切物喻佛不為煩惱破壞而能破壞一切煩惱故名金剛牢強也金體極明不為物照而能照一切物喻佛不為無明暗障而能照破無明故名普散金光也此二如來智德表顯七第十三之十六四佛南無大強精進勇猛佛南無大悲光佛南無慈力王佛南無慈藏佛大強精進勇猛者不雜曰精不退曰進不怯曰勇不怖曰猛謂世尊無量劫來於諸善法不雜不退故稱為大於諸惡道不怖不怯故稱為強由大強故不休不息故得斷除三障證三菩提故名大強精進勇猛也大悲光者謂豎窮橫遍曰大法身德也運心拔苦曰悲解脫德也寂照不二曰光般若德也三德圓融故名大悲光也慈力王者力勝也王往也謂佛念衆生慈無能勝能令人天皆共歸往故名慈力王也慈藏者謂一極慈心攝歸萬善法界含容出生無盡故名慈藏也此四如來從德表顯八第十七之二十四佛南無栴檀窟莊嚴勝佛南無賢善首佛南無善意佛南無廣莊嚴王佛栴檀窟莊嚴勝者妙香之所成也謂如來八萬四千毛孔皆出妙香猶如栴檀普熏一切以此妙寶莊嚴法窟最勝無比故名栴檀窟莊嚴勝也賢善首者如來道高德重故稱為賢迥出九界故稱曰善為天中之天聖中之聖故名賢善首也善意者謂如來慈念一切衆生猶如赤子從生至生接引無倦故名善意也廣莊嚴王者謂如來色相萬德莊嚴故稱為廣無量劫來自在安然不為物轉故名廣莊嚴王也此四如來依正顯德九第二十一之二十四四佛南無金華光佛南無寶蓋照空自在力王佛南無虛空寶華光佛南無琉璃莊嚴王佛金華光者謂戒心發行喻如金華離欲清淨喻如金光金表法身華表解脫光表般若三德理圓故名金華光也此顯如來清淨光明無邊相好皆以持戒而得莊嚴成就故律云諸佛證菩提獨覺身心淨及以阿羅漢咸由律行成寶蓋照空自在力王者以信為實七菩提分為蓋照耀虛空令諸衆生得大利樂自在無礙故名寶蓋照空自在力王也虛空寶華光者法身無相猶若虛空本來無染故稱為寶心花發焰照真法界故名虛空寶華光也琉璃莊嚴王者梵語琉璃此云青色寶乃七寶中之最勝者佛身清淨故曰琉璃內外明照故曰莊嚴不為群魔之所障蔽故名琉璃莊嚴王也此四如來法喻表顯十第二十五之二十九五佛南無普現色身光佛南無不動智光佛南無降伏衆魔王佛南無才光明佛南無智慧勝佛普現色身光者華嚴經云佛身充滿於法界普現一切群生前圓光普照于十方示現種種所行事故名普現色身光也不動智光者不動智即根本智體也謂本佛法身如如不動故光者即差別智用也謂從體起用如月印千江故名不動智光也降伏衆魔王者謂如來以無漏慧力降伏諸魔波旬受化於法自在故名降伏衆魔王也才光明者謂以無礙智慧辨才照了諸法破諸煩惱利益群生故名才光明也智慧勝者勝力也謂以一切智力破見思惑以道種智力破塵沙惑以一切種智力破無明惑三惑既除覺體常照功強於彼故名智慧勝也此五如來以法表顯十一第三十之三十三四佛南無彌勒仙光佛南無善寂月音妙尊智王佛南無世淨光佛南無龍種上尊王佛彌勒仙光者彌勒此云慈氏姓也仙覺也謂從發菩提心以來未嘗入俗故以為姓仙光者離垢清淨之光也佛為大慈金仙以無垢清淨智光普照諸有離苦得樂故名彌勒仙光也善寂月音妙尊智王者謂智照如月覺妙若音經云菩薩清涼月常遊畢竟空善寂月音也又云衆生心水淨菩提影現中妙尊智王也上句為喻下句為法謂以權實智光覺法自在如月形影音響一切雙亡雙照故名善寂月音妙尊智王也世淨光者謂如來出世以諸道法教化衆生清淨身心永離黑暗故名世淨光也龍種上尊王者謂龍種世間最為尊上聞佛音教感發信心歸投於佛而得自在故名龍種上尊王也此四如來種智顯德十二第三十四之三十八五佛南無日月光佛南無日月珠光佛南無慧幢勝王佛南無師子吼自在力王佛南無妙音勝佛日月光者謂以根本智證理以後得智斷惑情忘理顯心地開明光同日月故名日月光也日月珠光者謂如來以三覺智光照破一切衆生無明不覺之惑業故名日月珠光也慧幢勝王者謂如來建大智慧幢幡降伏魔軍功力殊勝故名慧幢勝王也獅子吼自在力王者獅子獸中之王發聲哮吼百獸潛藏如來法音奮同獅子智慧威德力勝如王故云獅子吼自在力王也古云佛獅子吼魔外拱手四衆聞之得大無畏是也妙音勝者謂如來說法不動聲色而周遍十方故曰妙音衆生聞之隨類得解究成種智故名妙音勝也此五如來法喻表顯十三第三十九之四十一三佛南無常光幢佛南無觀世燈佛南無慧威燈王佛常光幢者謂如來常建大光明幢無明黑暗悉皆摧滅故名常光幢也觀世燈者謂如來觀彼世間衆生從冥入冥不思返照是故以大法燈引歸寶所故名觀世燈也慧威燈王者以根本智起後得智現大法威故名慧威猶如燈王傳耀無盡衆生蒙光而得自在故名慧威燈王此三如來以法顯德十四第四十二之四十三二佛南無法勝王佛南無須彌光佛法勝王者經云我為法王於法自在故名法勝王也須彌光者須彌此云妙高山王名也謂四寶所成故稱為妙迥出群峰故稱為高既高且妙稱為山王照耀四方故名曰光以喻如來四智轉成妙覺佛果高出人天光明普照故名須彌光也此二如來法喻表顯十五第四十四之四十五二佛南無須摩那華光佛南無優曇鉢羅華殊勝王佛須摩那華光者須摩那此云稱意華名也色有黃白而香光遠徹以喻如來戒善香光無不稱意故名須摩那華光也優曇鉢羅華殊勝王者優曇鉢羅此云靈瑞又云瑞應華名也三千年一現現則金輪王出故名殊勝以喻如來希有難遇故名優曇鉢羅華殊勝王也經云諸佛興出世懸遠值遇難譬如優曇華時乃一現耳此二如來從喻表顯十六第四十六之四十九四佛南無大慧力王佛南無阿閦毗歡喜光佛南無無量音聲王佛南無才光佛大慧力王者顯非權小智慧之力也謂如來法王以大智慧力引導衆生直到涅槃彼岸故名大慧力王也阿閦毗歡喜光者阿閦毗此云不動佛名如如不動故歡喜國號人天喜愛故光者謂依正二報並放光明不動寂常十方遍照一切人天無不歡喜故名阿閦毗歡喜光也無量音聲王者謂如來以無盡音聲說無窮妙法自在無礙故名無量音聲王也才光者才辨才也光智光也謂如來具足無量辨才智慧光明普利一切故名才光也此四如來從法為名十七第五十之五十一二佛南無金海光佛南無山海慧自在通王佛金海光者謂佛身如海金光紫赤照耀無窮以喻海印三昧表法殊勝故楞嚴云如我按指海印發光故名金海光也山海慧自在通王者謂真實慧如山方便慧如海合則成無障礙慧故名山海慧也自在通王者俗諦曰自在真諦曰通中道諦曰王以此三種大智慧會入三諦理故名自在通王也此二如來智慧表顯十八第五十二之五十三二佛南無大通光佛南無一切法幢滿王佛大通光者謂覺體曰大法身德也覺用曰通解脫德也覺相曰光般若德也三德圓融不可思議故名大通光也一切法幢滿王者謂五教三乘名一切法標示人天曰幢周遍法界曰滿法法自在曰王以一切法豎窮橫遍圓融無礙故名一切法幢滿王也此二如來以法表顯略釋五十三佛名竟佛名經云三千諸佛因禮五十三佛滅除積習得成正覺佛尚懺禮況餘下耶今不動法師集此懺文將五十三佛增於三十五佛之前者普願法界衆生同共稱禮亦如三千諸佛一時同得阿耨多羅三藐三菩提也
