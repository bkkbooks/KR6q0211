body:
  text: 大懺悔文略解序夫欲求生淨域先須洗浣身心入聖超凡必使根塵迥脫所以如來示懺悔之方先德述修淨之法攝生之要無逾此也惟智者覺照愚者沉迷故我本師見月老和尚每於布薩之期先令懺摩然後説戒今此文者乃大唐不空三藏所譯三十五佛名經禮懺法也五天竺國遵行甚有靈應逮於趙宋不動三藏復以五十三佛洪名增之於前普賢十大願偈續之於後共成一百八禮題云大懺悔文始從讚禮稱名終於發願回向事理一貫權實雙彰令人朝夕禮誦期斷百八煩惱後來人根漸薄皆悉跪諷由是誦者頗多而達者無幾心既不誠云何感通諸佛故余不揣荒陋詳閲諸經採取要文發明少義名曰略解文雖不廣三懺全收法或未周五悔並攝願諸覽者如法行持庶得理顯情忘則蓮邦淨域不期而至也時康熙四十八年迦提吉旦蘭陵律學苾芻書玉題凡例十條佛號題文俱書頂格低一字者乃是今解所列科目又低一字一則尊敬佛法二則作述分明庶無紊亂其先後之次也集法之人流通本遺失飲水思源烏可缺焉故於釋題之次即便補出其名恐日久漸湮以昧古德弘法利生之願力也此懺悔願文髫年即能讀誦而有髮白不了其義者皆由文簡義深人多輕忽故也是以勉力解之作一助顯文中讚禮皈依懺悔發願雖則各自分開而佛號願偈不無疑議尤恐初心未了今亦科明庶幾覽者如指其掌五十三佛三十五佛緣起各有不同故今採取冠於兩節之前以見諸佛菩薩慈念衆生如母憶子之切不可忽也出義消文貴在直捷爽快如開門見山不容他往故此解中不論經律教部凡有與本文相符者即便録出以顯其義並不局於一處而生別見也諸佛德號義海難窮管見愚資如何測量但非解説則其德不顯故今隨號釋之雖不能深達佛理然亦無礙於法義也此中發心原揀去權小唯依上乘今釋文中又大小兼收者蓋欲令其回小向大會三歸一故毋得論其混雜也集此懺法普利群情不論道俗男女一切皆當修學然未登聖地已還誰能無過天中雖樂五衰相現即便向佛皈依何況人間衆苦縈纏而不勤行懺悔果能至誠禮誦而諸佛菩薩不攝受者未之有也誦此佛號必須精誠作觀如法稱揚一尊念完即便換氣不得帶南無二字如或上下牽連則冠履倒置於理不便務必留心至於如來十號亦要念得清楚善逝與世間解是兩號不可作一句念也禮佛大懺悔文大慈大悲愍衆生大喜大捨濟含識相好光明以自嚴衆等至心皈命禮南無皈依金剛上師皈依佛皈依法皈依僧我今發心不為自求人天福報聲聞緣覺乃至權乘諸位菩薩唯依最上乘發菩提心願與法界衆生一時同得阿耨多羅三藐三菩提南無皈依十方盡虛空界一切諸佛南無皈依十方盡虛空界一切尊法南無皈依十方盡虛空界一切賢聖僧南無如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊南無普光佛南無普明佛南無普淨佛南無多摩羅跋栴檀香佛南無栴檀光佛南無摩尼幢佛南無歡喜藏摩尼寶積佛南無一切世間樂見上大精進佛南無摩尼幢燈光佛南無慧炬照佛南無海德光明佛南無金剛牢強普散金光佛南無大強精進勇猛佛南無大悲光佛南無慈力王佛南無慈藏佛南無栴檀窟莊嚴勝佛南無賢善首佛南無善意佛南無廣莊嚴王佛南無金華光佛南無寶蓋照空自在力王佛南無虛空寶華光佛南無琉璃莊嚴王佛南無普現色身光佛南無不動智光佛南無降伏衆魔王佛南無才光明佛南無智慧勝佛南無彌勒仙光佛南無善寂月音妙尊智王佛南無世淨光佛南無龍種上尊王佛南無日月光佛南無日月珠光佛南無慧幢勝王佛南無師子吼自在力王佛南無妙音勝佛南無常光幢佛南無觀世燈佛南無慧威燈王佛南無法勝王佛南無須彌光佛南無須摩那華光佛南無優曇鉢羅華殊勝王佛南無大慧力王佛南無阿閦毗歡喜光佛南無無量音聲王佛南無才光佛南無金海光佛南無山海慧自在通王佛南無大通光佛南無一切法幢滿王佛南無釋迦牟尼佛南無金剛不壞佛南無寶光佛南無龍尊王佛南無精進軍佛南無精進喜佛南無寶火佛南無寶月光佛南無現無愚佛南無寶月佛南無無垢佛南無離垢佛南無勇施佛南無清淨佛南無清淨施佛南無娑留那佛南無水天佛南無堅德佛南無栴檀功德佛南無無量掬光佛南無光德佛南無無憂德佛南無那羅延佛南無功德華佛南無蓮華光遊戲神通佛南無才功德佛南無德念佛南無善名稱功德佛南無紅焰帝幢王佛南無善遊步功德佛南無鬥戰勝佛南無善遊步佛南無周匝莊嚴功德佛南無寶華遊步佛南無寶蓮華善住娑羅樹王佛南無法界藏身阿彌陀佛如是等一切世界諸佛世尊常住在世是諸世尊當慈念我若我此生若我前生從無始生死以來所作衆罪若自作若教他作見作隨喜若塔若僧若四方僧物若自取若教他取見取隨喜五無間罪若自作若教他作見作隨喜十不善道若自作若教他作見作隨喜所作罪障或有覆藏或不覆藏應墮地獄餓鬼畜生諸餘惡趣邊地下賤及蔑戾車如是等處所作罪障今皆懺悔今諸佛世尊當證知我當憶念我我復於諸佛世尊前作如是言若我此生若我餘生曾行布施或守淨戒乃至施與畜生一摶之食或修淨行所有善根成就衆生所有善根修行菩提所有善根及無上智所有善根一切合集校計籌量皆悉回向阿耨多羅三藐三菩提如過去未來現在諸佛所作回向我亦如是回向衆罪皆懺悔諸福盡隨喜及請佛功德願成無上智去來現在佛於衆生最勝無量功德海我今皈命禮所有十方世界中三世一切人師子我以清淨身語意一切遍禮盡無餘普賢行願威神力普現一切如來前一身復現剎塵身一一遍禮剎塵佛於一塵中塵數佛各處菩薩衆會中無盡法界塵亦然深信諸佛皆充滿各以一切音聲海普出無盡妙言辭盡於未來一切劫讚佛甚深功德海以諸最勝妙華鬘妓樂塗香及傘蓋如是最勝莊嚴具我以供養諸如來最勝衣服最勝香末香燒香與燈燭一一皆如妙高聚我悉供養諸如來我以廣大勝解心深信一切三世佛悉以普賢行願力普遍供養諸如來我昔所造諸惡業皆由無始貪瞋癡從身語意之所生一切我今皆懺悔十方一切諸衆生二乘有學及無學一切如來與菩薩所有功德皆隨喜十方所有世間燈最初成就菩提者我今一切皆勸請轉於無上妙法輪諸佛若欲示涅槃我悉至誠而勸請惟願久住剎塵劫利樂一切諸衆生所有禮讚供養福請佛住世轉法輪隨喜懺悔諸善根回向衆生及佛道願將以此勝功德回向無上真法界性相佛法及僧伽二諦融通三昧印如是無量功德海我今皆悉盡回向所有衆生身口意見惑彈謗我法等如是一切諸業障悉皆消滅盡無餘念念智周於法界廣度衆生皆不退乃至虛空世界盡衆生及業煩惱盡如是四法廣無邊願今回向亦如是南無大行普賢菩薩三稱
